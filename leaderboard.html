<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Summit 2 - Leaderboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #111;
            --neon-blue: #0ff;
            --neon-pink: #f0f;
            --neon-green: #39ff14;
            --gold: #ffd700;
            --silver: #c0c0c0;
            --bronze: #cd7f32;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Press Start 2P', monospace;
            text-align: center;
            margin: 0;
            padding: 20px;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        h1 {
            color: var(--gold);
            text-shadow: 0 0 10px var(--gold), 0 0 20px #ff8c00;
            font-size: 28px;
            margin-bottom: 40px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); text-shadow: 0 0 10px var(--gold); }
            50% { transform: scale(1.05); text-shadow: 0 0 30px #ff8c00, 0 0 50px var(--gold); }
            100% { transform: scale(1); text-shadow: 0 0 10px var(--gold); }
        }

        .board-container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.8);
            border: 4px solid var(--neon-blue);
            box-shadow: 0 0 15px var(--neon-blue), inset 0 0 15px var(--neon-blue);
            border-radius: 10px;
            padding: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            padding: 15px;
            border-bottom: 2px dashed #444;
            font-size: 12px;
            text-align: center;
        }

        th {
            color: var(--neon-pink);
            text-shadow: 0 0 5px var(--neon-pink);
            font-size: 14px;
            border-bottom: 4px solid var(--neon-pink);
        }

        /* Top 3 Ranks Decoration */
        tr.rank-1 td { color: var(--gold); font-weight: bold; text-shadow: 0 0 10px var(--gold); font-size: 14px;}
        tr.rank-2 td { color: var(--silver); font-weight: bold; text-shadow: 0 0 8px var(--silver); }
        tr.rank-3 td { color: var(--bronze); font-weight: bold; text-shadow: 0 0 8px var(--bronze); }
        
        .result-win { color: var(--neon-green); text-shadow: 0 0 5px var(--neon-green); }
        .result-loss { color: #ff3333; }

        #loading {
            color: var(--neon-blue);
            font-size: 20px;
            animation: blink 1s infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }

        .refresh-btn {
            background: transparent;
            color: var(--neon-blue);
            border: 2px solid var(--neon-blue);
            font-family: 'Press Start 2P';
            padding: 10px 20px;
            margin-top: 30px;
            cursor: pointer;
            box-shadow: 0 0 10px var(--neon-blue);
            transition: 0.3s;
        }

        .refresh-btn:hover {
            background: var(--neon-blue);
            color: #000;
        }

    </style>
</head>
<body>

    <h1>🏆 SUMMIT LEADERBOARD 🏆</h1>

    <div class="board-container">
        <div id="loading">LOADING DATA...</div>
        <table id="leaderboard" style="display: none;">
            <thead>
                <tr>
                    <th>RANK</th>
                    <th>TEAM NAME</th>
                    <th>RESULT</th>
                    <th>BOSS HP LEFT</th>
                    <th>TIME</th>
                </tr>
            </thead>
            <tbody id="board-body">
                </tbody>
        </table>
    </div>

    <button class="refresh-btn" onclick="fetchData()">🔄 REFRESH DATA</button>

<script>
    /* ========================================================
       🔥🔥🔥 DÁN LINK CSV TỪ GOOGLE SHEET CỦA BẠN VÀO ĐÂY 🔥🔥🔥
       ======================================================== */
    const CSV_LINK = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRu8QhHLEELa4PrDBr7I1BlSJEkjNRVhj9aEBXaBNAGkzRTrnLvC2ZcjPF3tIxb7SLXJoyioz03yJDB/pub?gid=328083399&single=true&output=csv"; 
    /* ======================================================== */

    // Hàm chuyển đổi chữ "1m 30s" thành số giây để máy tính tự động so sánh
    function parseTime(timeStr) {
        let seconds = 0;
        let t = timeStr.toLowerCase().replace(' ', '');
        if (t.includes('m')) {
            let parts = t.split('m');
            seconds += parseInt(parts[0] || 0) * 60;
            if (parts[1] && parts[1].includes('s')) {
                seconds += parseInt(parts[1].replace('s', '') || 0);
            }
        } else if (t.includes('s')) {
            seconds += parseInt(t.replace('s', '') || 0);
        }
        return seconds;
    }

    async function fetchData() {
        const loading = document.getElementById('loading');
        const table = document.getElementById('leaderboard');
        const tbody = document.getElementById('board-body');
        
        loading.style.display = "block";
        table.style.display = "none";
        tbody.innerHTML = "";

        if(CSV_LINK === "YOUR_CSV_LINK_HERE") {
            loading.innerHTML = "❌ LỖI: BẠN CHƯA DÁN LINK CSV VÀO CODE!";
            loading.style.color = "red";
            return;
        }

        try {
            const response = await fetch(CSV_LINK + "&t=" + new Date().getTime());
            const data = await response.text();
            
            let rows = data.split('\n').slice(1);
            let teams = [];

            rows.forEach(row => {
                if(!row.trim()) return;
                let cols = row.split(','); 
                if(cols.length >= 5) {
                    teams.push({
                        timestamp: cols[0],
                        name: cols[1].replace(/"/g, '').trim(),
                        result: cols[2].replace(/"/g, '').trim(),
                        hp: parseInt(cols[3]) || 0,
                        timeStr: cols[4].replace(/"/g, '').trim(),
                        timeSec: parseTime(cols[4])
                    });
                }
            });

            // THUẬT TOÁN XẾP HẠNG (RANK CẢ THẮNG & THUA)
            teams.sort((a, b) => {
                // Tiêu chí 1: HP CÒN LẠI CỦA BOSS. Càng ít HP thừa thì xếp càng cao (Số nhỏ lên trước)
                if (a.hp !== b.hp) return a.hp - b.hp; 
                
                // Tiêu chí 2: Cùng mức HP Boss, ai ĐÁNH NHANH HƠN (Thời gian ngắn hơn) sẽ xếp trên
                return a.timeSec - b.timeSec; 
            });

            // HIỂN THỊ LÊN BẢNG
            teams.forEach((team, index) => {
                let rank = index + 1;
                let tr = document.createElement('tr');
                
                // Trang trí màu sắc cho Top 3
                if(rank <= 3) tr.className = `rank-${rank}`;
                
                let rankIcon = rank;
                if(rank === 1) rankIcon = "🥇 1ST";
                if(rank === 2) rankIcon = "🥈 2ND";
                if(rank === 3) rankIcon = "🥉 3RD";

                let resultClass = team.result === 'VICTORY' ? 'result-win' : 'result-loss';

                tr.innerHTML = `
                    <td>${rankIcon}</td>
                    <td>${team.name}</td>
                    <td class="${resultClass}">${team.result}</td>
                    <td>${team.hp} HP</td>
                    <td>${team.timeStr}</td>
                `;
                tbody.appendChild(tr);
            });

            loading.style.display = "none";
            table.style.display = "table";

        } catch (error) {
            loading.innerHTML = "❌ LỖI KẾT NỐI TỚI GOOGLE SHEET!";
            loading.style.color = "red";
            console.error(error);
        }
    }

    // Tự động tải dữ liệu khi mở web và làm mới mỗi 15 giây
    window.onload = fetchData;
    setInterval(fetchData, 15000);

</script>
</body>
</html>
